name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Install gomobile-matsuri
        run: |
          git config --global url."https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"
          go install github.com/matsuridayo/gomobile-matsuri/cmd/gomobile-matsuri@latest
          go install github.com/matsuridayo/gomobile-matsuri/cmd/gobind-matsuri@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Init gomobile
        run: gomobile-matsuri init

      - name: Build libcore
        run: |
          cd libcore
          chmod +x build.sh
          ./build.sh

      - name: Build with Gradle
        run: ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NekoBoxForAndroid-Release
          path: app/build/outputs/apk/release/*.apk
